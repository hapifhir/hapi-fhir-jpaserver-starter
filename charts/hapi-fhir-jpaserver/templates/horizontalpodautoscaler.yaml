{{- if .Values.horizontalPodAutoscaler }}
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ include "hapi-fhir-jpaserver.fullname" . }}
  labels:
    {{- include "hapi-fhir-jpaserver.labels" . | nindent 4 }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ include "hapi-fhir-jpaserver.fullname" . }}
  {{- if .Values.horizontalPodAutoscaler.minReplicas }}
  minReplicas: {{ .Values.horizontalPodAutoscaler.minReplicas }}
  {{- end }}
  maxReplicas: {{ .Values.horizontalPodAutoscaler.maxReplicas }}
  metrics:
    {{- toYaml .Values.horizontalPodAutoscaler.metrics | nindent 4 }}
{{- end }}
