dependency-tree: true
debug: true
scan:
  include-dev-deps: true
  scanners:
    - vuln
    - misconfig
  skip-dirs:
    - /matchbox-frontend/node_modules
  sbom-sources:
    - oci
    - rekor
  rekor-url: https://rekor.sigstore.dev
vulnerability:
  ignore-unfixed: false
pkg:
  types:
    - os
    - library
  ignore-unfixed: false
