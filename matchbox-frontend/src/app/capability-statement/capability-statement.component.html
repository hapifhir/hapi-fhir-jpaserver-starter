<div class="white-block" id="capability-statement">
  <h2>CapabilityStatement</h2>

  <p>
    CapabilityStatement of the server: <code>{{ client.baseUrl }}</code>
  </p>

  @if (loading) {
    <mat-spinner></mat-spinner>
  }

  <div id="code"></div>

  @if (operationResult) {
    <app-operation-result [operationResult]="operationResult"></app-operation-result>
  }
</div>
